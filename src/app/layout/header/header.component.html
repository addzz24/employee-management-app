<header class="header">
  <div class="left">
    <img src="assets/logo.svg" alt="Logo" />
    <span class="logo">EmpManage</span>
    <nav>
      <a class="nav-item" [class.selected]="currentRoute() === '/dashboard'" (click)="onNavItemClick('dashboard')">Dashboard</a>
      <a class="nav-item" [class.selected]="currentRoute() === '/employees'" (click)="onNavItemClick('employees')">Employee List</a>
      <a class="nav-item" [class.selected]="currentRoute() === '/add-employee'" (click)="onNavItemClick('add-employee')">Add Employee</a>
    </nav>
  </div>

  <div class="right">
    <div class="user">
      <img src="https://i.pravatar.cc/40" alt="user" />
      <div>
        <div class="name">Sarah Jenkins</div>
        <div class="role">HR Admin</div>
      </div>
    </div>
  </div>
</header>
