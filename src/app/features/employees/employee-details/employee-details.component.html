<div class="employee-details-container">
  <div class="heading">
    <h1>Employees</h1>
    <p>Manage your team members, update details and view employment status.</p>
  </div>

  <div class="custom-toggle">
    <input type="checkbox" id="viewToggle" (change)="onToggle()" />
    <label for="viewToggle">
      <span class="icons">
        <mat-icon class="icon left" matTooltip="Table View">table_rows</mat-icon>
        <mat-icon class="icon right" matTooltip="Card View">grid_view</mat-icon>
      </span>
    </label>
  </div>
</div>

<div class="employee-data-container">
  <!-- Filters and actions toolbar -->
  <app-table-toolbar
    [filtersConfig]="filtersConfig()"
    (apply)="onApplyFilters($event)"
    (reset)="onResetFilters()"
    (searchChange)="onSearch($event)"
  ></app-table-toolbar>

  <!-- Employee data table or card view -->
  @if (isTableView()) {
    <app-data-table
      [dataSource]="dataSource"
      [visibleColumns]="displayedColumns"
      (tableActionEmitter)="handleTableAction($event)"
      [tableActions]="tableActions"
      [loading]="loading()"
    ></app-data-table>
  } @else {
    <ng-container
      [ngTemplateOutlet]="!employees() || employees().length === 0 ? emptyState : cardListView"
    >
    </ng-container>
  }

  <!-- Pagination controls -->
  <mat-paginator
    [length]="totalEmployees()"
    [pageSize]="pageSize()"
    [pageIndex]="currentPage()"
    [pageSizeOptions]="[5, 10, 25, 100]"
    (page)="onPageChange($event)"
  >
  </mat-paginator>
</div>

<ng-template #emptyState>
  <div class="empty-state-wrapper">
    <div class="empty-content">
      <mat-icon class="empty-icon">group_off</mat-icon>
      <h3>No Data Found</h3>
      <p>It looks like there are no records in the system yet.</p>

      <button mat-flat-button color="primary" class="mt-4" (click)="onAddItemClick()">
        <mat-icon>add</mat-icon>
        Add Your Record
      </button>
    </div>
  </div>
</ng-template>

<ng-template #cardListView>
  <ng-container [ngTemplateOutlet]="loading() ? loader : carList"></ng-container>
</ng-template>

<ng-template #carList>
  <div class="card-list">
    @for (emp of employees(); track emp.id) {
      <app-data-card
        class="card-list-item"
        [employee]="emp"
        (delete)="handleTableAction($event)"
      ></app-data-card>
    }
  </div>
</ng-template>

<ng-template #loader>
  <div class="loader-overlay">
    <mat-spinner diameter="50"></mat-spinner>
  </div>
</ng-template>
