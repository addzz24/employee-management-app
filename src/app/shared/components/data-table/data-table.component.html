
    <!-- Data table -->
    <table mat-table [dataSource]="dataSource" matSort>
      @for (column of visibleColumns(); track column) {
        <ng-container [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="font-bold">
            {{ column | titleCaseSplit }}
          </th>

          <td mat-cell *matCellDef="let row">
            @if (column === 'actions') {
              @for (action of tableActions(); track action) {
                <button disableRipple mat-button (click)="emitTableAction(action.label, row)" [matTooltip]="action.tooltip">
                  <mat-icon class="action-icon">{{ action.icon }}</mat-icon>
                </button>
              }
            } @else {
              {{ row[column] }}
            }
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="visibleColumns()"></tr>
      <tr mat-row *matRowDef="let row; columns: visibleColumns()"></tr>
    </table>
    @if (enablePagination()) {
      <mat-paginator [length]="data().length" [pageSize]="5" [pageSizeOptions]="[5, 10, 20]">
      </mat-paginator>
    }
